<style>
  :root{--bg:#0b0706;--gold:#c9a24b;--gold-soft:#e6cf95;--cream:#f3ecdc;--muted:#a59c92;--line:rgba(201,162,75,.22);--red:#c0352e;--red-soft:#e0685f}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--cream);font-family:'Montserrat',system-ui,sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
  h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif;line-height:1.1}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}

  /* Background art */
  .bg-art{position:fixed;inset:0;z-index:0;overflow:hidden}
  .bg-art img,.bg-art video{width:100%;height:100%;object-fit:cover;filter:blur(28px) brightness(.32) saturate(1.1);transform:scale(1.15)}
  .bg-art::after{content:"";position:absolute;inset:0;background:
    radial-gradient(900px 600px at 50% 20%,rgba(201,162,75,.16),transparent 60%),
    linear-gradient(180deg,rgba(11,7,6,.55),rgba(11,7,6,.92))}

  .stage{position:relative;z-index:2;max-width:560px;margin:0 auto;padding:54px 24px 70px;text-align:center}

  .topline{font-weight:500;font-size:.7rem;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);margin-bottom:26px}
  .topline a{color:var(--muted)}
  .cover{width:300px;max-width:78%;margin:0 auto;border-radius:8px;overflow:hidden;border:1px solid var(--line);
    box-shadow:0 30px 90px rgba(0,0,0,.7);aspect-ratio:1;background:#130c0b;position:relative}
  .cover img{width:100%;height:100%;object-fit:cover}
  .cover .pulse{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:linear-gradient(to top,rgba(11,7,6,.4),transparent)}
  .cover .pulse .c{width:70px;height:70px;border-radius:50%;background:rgba(201,162,75,.92);color:#0d0908;display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 0 0 0 rgba(201,162,75,.5);animation:ring 2.4s infinite}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(201,162,75,.5)}70%{box-shadow:0 0 0 22px rgba(201,162,75,0)}100%{box-shadow:0 0 0 0 rgba(201,162,75,0)}}

  .artist{margin-top:30px;font-size:.74rem;letter-spacing:.28em;text-transform:uppercase;color:var(--muted)}
  h1.track{font-size:clamp(2.2rem,8vw,3.4rem);font-weight:700;margin:8px 0 6px}
  .feat{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.2rem;color:var(--gold-soft)}

  /* Countdown */
  .count{display:flex;justify-content:center;gap:14px;margin:30px 0 8px}
  .count .u{min-width:64px}
  .count .n{font-family:'Cormorant Garamond',serif;font-size:2.4rem;color:var(--gold);line-height:1}
  .count .l{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .count-label{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
  .live-badge{display:inline-block;font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--red-soft);border:1px solid rgba(192,53,46,.55);background:rgba(192,53,46,.1);border-radius:20px;padding:6px 16px;margin:26px 0 6px}

  /* Platform buttons */
  .cta-head{margin:30px 0 16px;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  .platforms{display:flex;flex-direction:column;gap:11px}
  .pf{display:flex;align-items:center;gap:14px;justify-content:space-between;background:rgba(26,16,13,.82);border:1px solid var(--line);
    border-radius:6px;padding:14px 18px;transition:.22s;backdrop-filter:blur(6px)}
  .pf:hover{border-color:var(--gold);transform:translateY(-2px);background:rgba(34,21,16,.92)}
  .pf .left{display:flex;align-items:center;gap:14px}
  .pf .ico{width:26px;height:26px;fill:var(--cream);flex-shrink:0}
  .pf:hover .ico{fill:var(--gold)}
  .pf .name{font-size:.95rem;letter-spacing:.02em}
  .pf .act{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);border:1px solid var(--line);border-radius:3px;padding:7px 14px;transition:.2s}
  .pf:hover .act{background:var(--gold);color:var(--bg);border-color:var(--gold)}

  /* Email capture */
  .capture{margin-top:34px;border:1px solid var(--line);border-radius:8px;padding:26px 22px;background:rgba(20,12,10,.7);backdrop-filter:blur(6px)}
  .capture h3{font-size:1.4rem;margin-bottom:6px}
  .capture p{color:var(--muted);font-size:.84rem;margin-bottom:16px}
  .capture form{display:flex;gap:8px}
  .capture input{flex:1;background:#0c0807;border:1px solid var(--line);border-radius:4px;padding:13px 14px;color:var(--cream);font-family:inherit;font-size:.9rem}
  .capture input:focus{outline:none;border-color:var(--gold)}
  .capture button{background:linear-gradient(135deg,var(--gold),#a9842f);color:#0d0908;border:none;border-radius:4px;padding:0 20px;font-family:inherit;font-weight:600;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;white-space:nowrap}
  .cap-status{margin-top:10px;font-size:.8rem;min-height:1em}
  .cap-status.ok{color:var(--gold-soft)}.cap-status.err{color:#e0857a}

  .share{margin-top:30px;display:flex;gap:14px;justify-content:center}
  .share a{width:42px;height:42px;border:1px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--cream);transition:.2s}
  .share a:hover{border-color:var(--gold);color:var(--gold)}
  .share svg{width:17px;height:17px;fill:currentColor}

  .footer{margin-top:40px;font-size:.7rem;color:var(--muted);letter-spacing:.05em}
  .footer a{color:var(--gold)}
  .lang-mini{position:fixed;top:16px;right:18px;z-index:5;display:flex;border:1px solid var(--line);border-radius:3px;overflow:hidden;background:rgba(11,7,6,.6)}
  .lang-mini button{background:none;border:none;color:var(--muted);font-family:inherit;font-size:.66rem;padding:6px 10px;cursor:pointer}
  .lang-mini button.active{background:var(--gold);color:var(--bg)}
  #ytHost{position:fixed;left:-9999px;width:1px;height:1px;opacity:0}

};

/* ---- Píxel Meta + GA4 (se activan solo si pones los IDs) ---- */
(function(){
  if(REL.metaPixelId){
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init',REL.metaPixelId); fbq('track','PageView'); fbq('track','ViewContent',{content_name:REL.title});
  }
  if(REL.ga4Id){
    var g=document.createElement('script');g.async=1;g.src='https://www.googletagmanager.com/gtag/js?id='+REL.ga4Id;document.head.appendChild(g);
    window.dataLayer=window.dataLayer||[];window.gtag=function(){dataLayer.push(arguments)};gtag('js',new Date());gtag('config',REL.ga4Id);
  }
})();
function track(ev,data){ if(window.fbq)fbq('track',ev,data||{}); if(window.gtag)gtag('event',ev,data||{}); }

/* ---- i18n ---- */
const T={es:{cd_label:"Disponible en",cd_days:"Días",cd_hrs:"Horas",cd_min:"Min",cd_sec:"Seg",
  live:"● Disponible ahora",cta_presave:"Resérvalo · Pre-save",cta_live:"Escúchalo ahora",
  cap_title:"Entérate primero",cap_sub:"Déjame tu correo y te aviso de cada nuevo tema y concierto.",cap_btn:"Unirme",
  presave:"Pre-save",play:"Escuchar",sent:"¡Listo! Gracias por unirte.",err:"No se pudo. Intenta de nuevo.",foot:"Bendecido para bendecir"},
 en:{cd_label:"Available in",cd_days:"Days",cd_hrs:"Hrs",cd_min:"Min",cd_sec:"Sec",
  live:"● Out now",cta_presave:"Save it · Pre-save",cta_live:"Listen now",
  cap_title:"Be the first to know",cap_sub:"Drop your email and I'll tell you about every new song and concert.",cap_btn:"Join",
  presave:"Pre-save",play:"Listen",sent:"Done! Thanks for joining.",err:"Couldn't send. Try again.",foot:"Blessed to bless"}};
let LANG=(localStorage.getItem('jb_lang')||(navigator.language||'es').slice(0,2)); if(!T[LANG])LANG='es';

const PLATFORMS=[
  {key:'spotify',name:'Spotify',ico:'<path d="M12 0a12 12 0 1 0 0 24 12 12 0 0 0 0-24Zm5.5 17.3a.75.75 0 0 1-1.03.25c-2.82-1.72-6.36-2.11-10.54-1.16a.75.75 0 1 1-.33-1.46c4.56-1.04 8.48-.59 11.65 1.34.35.22.46.68.25 1.03Zm1.47-3.27a.94.94 0 0 1-1.29.31c-3.23-1.98-8.15-2.56-11.97-1.4a.94.94 0 1 1-.54-1.8c4.37-1.31 9.79-.67 13.5 1.6.44.27.58.85.3 1.29Zm.13-3.4C15.27 8.34 8.82 8.13 5.1 9.26a1.12 1.12 0 1 1-.65-2.15c4.27-1.3 11.4-1.05 15.9 1.62a1.12 1.12 0 1 1-1.15 1.93Z"/>'},
  {key:'apple',name:'Apple Music',ico:'<path d="M16.4 1.9c0 1.1-.4 2.1-1.2 2.9-.9.9-2 1.5-3.1 1.4-.1-1.1.4-2.2 1.1-2.9.8-.9 2.1-1.5 3.2-1.5 0 .1 0 .1 0 .1ZM20.6 17c-.6 1.4-.9 2-1.7 3.2-1.1 1.7-2.6 3.7-4.5 3.7-1.7 0-2.1-1.1-4.4-1.1-2.3 0-2.8 1.1-4.4 1.1-1.9 0-3.4-1.9-4.5-3.5C-.4 16.6-.6 11.2 1.7 8.5 3 6.9 5 6 6.9 6c1.8 0 3 1.1 4.4 1.1 1.4 0 2.2-1.1 4.4-1.1 1.6 0 3.3.9 4.5 2.4-3.9 2.2-3.3 7.8.4 8.6Z"/>'},
  {key:'youtube',name:'YouTube',ico:'<path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8ZM9.6 15.6V8.4l6.2 3.6-6.2 3.6Z"/>'},
  {key:'amazon',name:'Amazon Music',ico:'<path d="M13.5 16.2c-2.3 1.7-5.7 2.6-8.6 2.6-4 0-7.6-1.5-10.3-4-0.2-.2 0-.5.3-.3 2.9 1.7 6.5 2.7 10.2 2.7 2.6 0 5.4-.5 8-1.6.4-.2.7.3.4.6Z" transform="translate(6 -1)"/><path d="M14.3 15.3c-.3-.4-2-.2-2.7-.1-.2 0-.3-.2-.1-.3 1.3-.9 3.5-.7 3.8-.3.2.3-.1 2.5-1.3 3.5-.2.2-.4.1-.3-.1.3-.7.8-2.2.6-2.6Z" transform="translate(6 -1)"/>'},
  {key:'deezer',name:'Deezer',ico:'<path d="M19 4h5v3h-5V4ZM12.6 8h5v3h-5V8ZM19 8h5v3h-5V8ZM6.3 12h5v3h-5v-3ZM12.6 12h5v3h-5v-3ZM19 12h5v3h-5v-3ZM0 16h5v3H0v-3ZM6.3 16h5v3h-5v-3ZM12.6 16h5v3h-5v-3ZM19 16h5v3h-5v-3Z"/>'}
];

let isLive=false;
function build(){
  const d=T[LANG]; document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const k=e.getAttribute('data-i18n');if(d[k])e.textContent=d[k];});
  document.querySelectorAll('.lang-mini button').forEach(b=>b.classList.toggle('active',b.dataset.lang===LANG));
  document.getElementById('trackTitle').textContent=REL.title;
  document.getElementById('trackFeat').textContent=LANG==='es'?REL.featES:REL.featEN;
  document.getElementById('coverImg').src=REL.cover;
  // background
  const bg=document.getElementById('bgArt');
  bg.innerHTML = REL.bgVideoYouTubeId
    ? `<img src="https://img.youtube.com/vi/${REL.bgVideoYouTubeId}/maxresdefault.jpg" alt="">`
    : `<img src="${REL.cover}" alt="">`;
  // platforms
  const release=new Date(REL.releaseDateISO).getTime(); isLive=Date.now()>=release;
  document.getElementById('ctaHead').textContent = isLive?d.cta_live:d.cta_presave;
  const ph=document.getElementById('platforms'); ph.innerHTML='';
  PLATFORMS.forEach(p=>{ const url=REL.links[p.key]; if(!url)return;
    const act=isLive?d.play:d.presave;
    const utm=(url.indexOf('?')<0?'?':'&')+'utm_source=landing&utm_medium=smartlink&utm_campaign='+encodeURIComponent(REL.title);
    const a=document.createElement('a'); a.className='pf'; a.href=url+utm; a.target='_blank'; a.rel='noopener';
    a.innerHTML=`<span class="left"><svg class="ico" viewBox="0 0 24 24">${p.ico}</svg><span class="name">${p.name}</span></span><span class="act">${act}</span>`;
    a.addEventListener('click',()=>track(isLive?'StreamClick':'PreSave',{platform:p.key,content_name:REL.title}));
    ph.appendChild(a);
  });
  // share links
  const pageUrl=encodeURIComponent(location.href);
  const txt=encodeURIComponent(`${REL.artist} — ${REL.title} 🎷`);
  shWa.href=`https://wa.me/?text=${txt}%20${pageUrl}`;
  shFb.href=`https://www.facebook.com/sharer/sharer.php?u=${pageUrl}`;
  shTw.href=`https://twitter.com/intent/tweet?text=${txt}&url=${pageUrl}`;
}
document.querySelectorAll('.lang-mini button').forEach(b=>b.addEventListener('click',()=>{LANG=b.dataset.lang;localStorage.setItem('jb_lang',LANG);build();}));

/* Countdown */
function tick(){
  const target=new Date(REL.releaseDateISO).getTime(); const diff=target-Date.now();
  if(diff<=0){ document.getElementById('countdownWrap').style.display='none'; document.getElementById('liveWrap').style.display='block'; return; }
  const dd=Math.floor(diff/864e5),hh=Math.floor(diff%864e5/36e5),mm=Math.floor(diff%36e5/6e4),ss=Math.floor(diff%6e4/1e3);
  const p=n=>('0'+n).slice(-2);
  document.getElementById('cd-d').textContent=p(dd);document.getElementById('cd-h').textContent=p(hh);
  document.getElementById('cd-m').textContent=p(mm);document.getElementById('cd-s').textContent=p(ss);
}

/* Email capture */
document.getElementById('capForm').addEventListener('submit',async function(e){
  e.preventDefault(); const d=T[LANG]; const st=document.getElementById('capStatus'); const f=e.target;
  if(REL.formspreeId){
    try{ const r=await fetch('https://formspree.io/f/'+REL.formspreeId,{method:'POST',headers:{Accept:'application/json'},body:new FormData(f)});
      if(r.ok){st.className='cap-status ok';st.textContent=d.sent;f.reset();track('Lead',{content_name:REL.title});} else throw 0;
    }catch{ st.className='cap-status err'; st.textContent=d.err; }
  } else { st.className='cap-status ok'; st.textContent=d.sent; f.reset(); track('Lead'); }
});

/* Preview (YouTube audio) */
let yt=null,ytReady=false,previewing=false;
window.onYouTubeIframeAPIReady=function(){ if(!REL.previewYouTubeId)return;
  yt=new YT.Player('ytHost',{height:'1',width:'1',videoId:REL.previewYouTubeId,playerVars:{playsinline:1},
    events:{onReady:()=>ytReady=true}}); };
(function(){ if(!REL.previewYouTubeId)return; var s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s); })();
function preview(){ if(!REL.previewYouTubeId){ window.open(REL.links.youtube,'_blank'); return; }
  if(!ytReady)return; const btn=document.querySelector('#coverPlay .c');
  if(previewing){yt.pauseVideo();btn.textContent='▶';previewing=false;} else {yt.playVideo();btn.textContent='⏸';previewing=true;track('PreviewPlay',{content_name:REL.title});} }

/* JSON-LD */
(function(){ const ld={"@context":"https://schema.org","@type":"MusicRecording","name":REL.title,
  byArtist:{"@type":"MusicGroup",name:REL.artist},image:REL.cover,datePublished:REL.releaseDateISO.slice(0,10)};
  const s=document.createElement('script');s.type='application/ld+json';s.textContent=JSON.stringify(ld);document.head.appendChild(s); })();

build(); tick(); setInterval(tick,1000);
